<!DOCTYPE html>
<html>
<head>
<style>
.video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
    overflow: hidden;
    max-width: 100%;
}
.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<h2>Responsive YouTube Video</h2>

<div class="video-container">
    <iframe 
        src="https://youtu.be/lue4nserWek?si=JHXB4D0WJf1SJVsn"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
